<!DOCTYPE html>
<html>
<head>
    <title>Удалить заказ</title>
</head>
<body>
    <h1>Удалить заказ #{{ order.id }}?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'order_detail' order.id %}">Отмена</a>
    </form>
</body>
</html>
